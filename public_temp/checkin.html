<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Self Check‑in | RCCG TOP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f9fafb, #e5e7eb); min-height: 100vh; }
        .toast-message { animation: slideOut 3s forwards; position: fixed; top: 20px; right: 20px; z-index: 1000; }
        @keyframes slideOut { 0% { opacity: 1; transform: translateX(0); } 70% { opacity: 1; } 100% { opacity: 0; transform: translateX(100%); visibility: hidden; } }

   .dynamic-image {
    height: 150px;
    position: relative; top: -10px; right: -90px;
    animation: float 3s ease-in-out infinite;
}
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div id="toastContainer" class="fixed top-5 right-5 z-50"></div>

    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl overflow-hidden">
        <div class="bg-emerald-600 p-6 text-white text-center">
        <img src="images/Rccg_logo.png" class="dynamic-image" alt="Floating Logo">
            <h1 class="text-2xl font-bold">RCCG TABERNACLE OF PRAISE</h1>
            <p class="text-sm opacity-90">ZONAL PARISH</p>
        </div>

        <div class="p-6 space-y-5">
            <!-- QR Scanner Section -->
            <div class="bg-gray-50 rounded-2xl p-4 text-center">
                <button id="toggleScannerBtn" class="w-full bg-blue-600 text-white py-2 rounded-xl flex items-center justify-center gap-2">
                    Fill In Your Details To Check-In
                </button>
                <div id="qrReader" style="display: none; margin-top: 1rem;"></div>
            </div>

            <!-- Check‑in Form -->
            <form id="checkinForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold">Full Name *</label>
                    <input type="text" id="name" required class="w-full border rounded-xl px-4 py-3 focus:ring-emerald-500">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm font-semibold">Category *</label>
                        <select id="category" required class="w-full border rounded-xl px-4 py-3">
                            <option value="">Select</option>
                            <option value="Children">Children</option><option value="Youth">Youth</option>
                            <option value="Married">Married</option><option value="Single">Single</option><option value="Elder">Elder</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold">Gender *</label>
                        <select id="gender" required class="w-full border rounded-xl px-4 py-3">
                            <option value="">Select</option><option value="Male">Male</option><option value="Female">Female</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold">Phone Number</label>
                    <input type="tel" id="phone" class="w-full border rounded-xl px-4 py-3">
                </div>
                <div>
                    <label class="block text-sm font-semibold">Service Type *</label>
                    <select id="serviceType" required class="w-full border rounded-xl px-4 py-3">
                        <option value="Sunday Service">Sunday Service</option>
                        <option value="Bible Study">Bible Study</option>
                        <option value="Prayer Meeting">Prayer Meeting</option>
                        <option value="Special Program">Special Program</option>
                        <option value="Midweek Service">Midweek Service</option>
                    </select>
                </div>
                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl transition">
                    <i class="fa-regular fa-calendar-check"></i> Check In
                </button>
            </form>
        </div>
        <div class="bg-gray-50 p-4 text-center text-xs text-gray-500">
            <i class="fa-regular fa-clock"></i> You will be marked as checked in for today's service.
        </div>
    </div>

    <script>
        const API_URL = '/api/attendance';
        let html5QrCode = null;
        let isScanning = false;

        // Helper toast
        function showToast(msg, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast-message bg-white border-l-4 ${type === 'success' ? 'border-emerald-500' : 'border-red-500'} shadow-lg rounded-xl p-3 text-sm mb-2`;
            toast.innerHTML = `<i class="fa-${type === 'success' ? 'solid fa-circle-check text-emerald-500' : 'solid fa-exclamation-triangle text-red-500'} mr-2"></i>${msg}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Auto-fill form from member data
        async function loadMemberById(memberId) {
            try {
                const res = await axios.get(`/api/users/${memberId}`);
                const member = res.data;
                document.getElementById('name').value = member.name;
                document.getElementById('phone').value = member.phone;
                // Optionally prefill category/gender if available in member record
                // Your current member schema doesn't have category/gender, so leave blank.
                // You could extend member schema, but optional.
                showToast('Member data loaded, please complete category & gender if needed.', 'success');
            } catch (err) {
                showToast('Member not found, please fill manually.', 'error');
            }
        }

        // Get URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const memberId = urlParams.get('memberId');
        if (memberId) {
            loadMemberById(memberId);
        }

        // Form submission
        document.getElementById('checkinForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('name').value.trim(),
                category: document.getElementById('category').value,
                gender: document.getElementById('gender').value,
                phone: document.getElementById('phone').value.trim(),
                serviceType: document.getElementById('serviceType').value,
                date: new Date().toISOString(),
                notes: 'Self check‑in'
            };
            if (!data.name || !data.category || !data.gender || !data.serviceType) {
                showToast('Please fill all required fields', 'error');
                return;
            }
            try {
                await axios.post(API_URL, data);
                showToast('✅ Checked in successfully!');
                e.target.reset();
                // reset category/gender to empty
                document.getElementById('category').value = '';
                document.getElementById('gender').value = '';
                document.getElementById('serviceType').value = 'Sunday Service';
            } catch (err) {
                const msg = err.response?.data?.message || 'Check-in failed';
                showToast(msg, 'error');
            }
        });
    </script>
</body>
</html>
