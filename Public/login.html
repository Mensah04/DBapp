<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCCG TOP - Admin Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <!-- Replace with your actual church logo -->
        <img src="images/Rccg_logo.png" alt="RCCG TOP Logo" class="church-logo">
        
        <h1>You Are Welcome</h1>
        <h2>Please Provide The Credentials To Access The Database</h2>
        
        <form id="loginForm">
            <div class="form-group">
                <input type="text" id="username" placeholder="Username" required minlength="3" maxlength="50">
                <i class="input-icon">👤</i>
            </div>
            
            <div class="form-group">
                <input type="password" id="password" placeholder="Password" required minlength="6">
                <i class="input-icon">🔒</i>
            </div>
            
            <button type="submit" class="submit-btn">Login</button>
            <p id="error"></p>
        </form>
        
        <p class="footer-text">RCCG Tabernacle of Praise &copy; <span id="year"></span></p>
    </div>

    <script>
        // Set current year in footer
        document.getElementById('year').textContent = new Date().getFullYear();

        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const errorElement = document.getElementById('error');
            errorElement.textContent = '';
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            // Simple client-side validation
            if (!username || !password) {
                errorElement.textContent = 'Please provide the username and password';
                return;
            }

            fetch('/api/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ username, password }),
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                return response.json();
            })
            .then(data => {
                if (data.success) {
                    // Clear the form fields
                    document.getElementById('username').value = '';
                    document.getElementById('password').value = '';
                    
                    // Redirect to the main page
                    window.location.href = '/index.html';
                } else {
                    errorElement.textContent = data.message || 'Invalid credentials';
                }
            })
            .catch(error => {
                console.error('Error:', error);
                errorElement.textContent = 'Invalid username or password';
            });
        });
    </script>
</body>
</html>
