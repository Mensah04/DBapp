      <script>
    // -------------------- GLOBAL STATE --------------------
    let masterRecords = [];
    let filteredRecords = [];
    let statusChart, trendChart;
    let currentPage = 1;
    const rowsPerPage = 8;
    
    // ========== TOAST NOTIFICATION ==========
    function showToast(message, type = 'success') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `toast-message bg-white border-l-4 ${type === 'success' ? 'border-emerald-500' : 'border-red-500'} shadow-xl rounded-xl p-3 flex items-center gap-3 text-sm`;
        toast.innerHTML = `<i class="fa-${type === 'success' ? 'solid fa-circle-check text-emerald-500' : 'solid fa-triangle-exclamation text-red-500'}"></i><span class="text-gray-700">${message}</span>`;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    const startDateInput = document.getElementById('startDate');
    const endDateInput = document.getElementById('endDate');
    const globalStatusSelect = document.getElementById('global-status-filter');
    const searchInput = document.getElementById('search-input');
    // ========== LOAD DATA FROM BACKEND ==========
    async function loadMasterData() {
        try {
            const statusFilter = globalStatusSelect.value;
            let url = `/api/dashboard-stats?range=all`;
            if (statusFilter) url += `&status=${encodeURIComponent(statusFilter)}`;
            const res = await axios.get(url);
            masterRecords = res.data.users || [];
            masterRecords = masterRecords.map(r => ({ ...r, dateFollowedUp: r.dateFollowedUp || null, status: r.status || 'Regular', phoneNumber: r.phoneNumber || '', _id: r._id || r.id }));
            applyClientFilters(); 
            updateQuickRangeUI();
        } catch (err) {
            console.error(err);
            showToast("Failed to load data. Check connection.", "error");
            masterRecords = [];
            applyClientFilters();
        }
    }

    function applyClientFilters() {
        let start = startDateInput.value ? new Date(startDateInput.value) : null;
        let end = endDateInput.value ? new Date(endDateInput.value) : null;
        if (end) end.setHours(23,59,59,999);
        const searchTerm = searchInput.value.toLowerCase().trim();

        filteredRecords = masterRecords.filter(record => {
            let followDate = record.dateFollowedUp ? new Date(record.dateFollowedUp) : null;
            if (start && followDate && followDate < start) return false;
            if (end && followDate && followDate > end) return false;
            if (searchTerm) {
                const nameMatch = record.name?.toLowerCase().includes(searchTerm);
                const phoneMatch = record.phoneNumber?.toLowerCase().includes(searchTerm);
                if (!nameMatch && !phoneMatch) return false;
            }
            return true;
        });
        filteredRecords.sort((a,b) => (isOverdue(b) - isOverdue(a)));
        currentPage = 1;
        updateDashboardUI();
        renderTable();
        renderPagination();
    }

    function isOverdue(record) {
        if (!record.dateFollowedUp) return true;
        const lastDate = new Date(record.dateFollowedUp);
        const daysDiff = (Date.now() - lastDate) / (1000*3600*24);
        return daysDiff > 30;
    }

    function updateDashboardUI() {
        updateKPICards();
        updateStatusChartFromFiltered();
        updateTrendChartFromFiltered();
        const overdueCount = filteredRecords.filter(r => isOverdue(r)).length;
        document.getElementById('stats-badge').innerHTML = `<i class="fa-regular fa-clock mr-1"></i> ${overdueCount} overdue / ${filteredRecords.length} total`;
    }

    function updateKPICards() {
        const total = filteredRecords.length;
        const regular = filteredRecords.filter(r => r.status === 'Regular').length;
        const irregular = filteredRecords.filter(r => r.status === 'Irregular').length;
        const visitors = filteredRecords.filter(r => r.status === 'Visitor' || r.status === 'First Timer').length;
        const overdue = filteredRecords.filter(r => isOverdue(r)).length;
        const html = `
            <div class="bg-white rounded-2xl p-5 card-hover-modern shadow-sm border border-gray-100 transition">
                <div class="flex items-center justify-between"><div><p class="text-gray-500 text-sm">Total Members</p><p class="text-3xl font-black mt-1">${total}</p></div><div class="h-12 w-12 rounded-xl bg-emerald-100 text-emerald-600 flex items-center justify-center text-xl"><i class="fa-solid fa-users"></i></div></div>
            </div>
            <div class="bg-white rounded-2xl p-5 card-hover-modern shadow-sm border border-gray-100"><div class="flex items-center justify-between"><div><p class="text-gray-500 text-sm">Regular</p><p class="text-3xl font-black mt-1">${regular}</p></div><div class="h-12 w-12 rounded-xl bg-blue-100 text-blue-600 flex items-center justify-center text-xl"><i class="fa-solid fa-check-circle"></i></div></div></div>
            <div class="bg-white rounded-2xl p-5 card-hover-modern shadow-sm border border-gray-100"><div class="flex items-center justify-between"><div><p class="text-gray-500 text-sm">Visitors/First Timers</p><p class="text-3xl font-black mt-1">${visitors}</p></div><div class="h-12 w-12 rounded-xl bg-amber-100 text-amber-600 flex items-center justify-center text-xl"><i class="fa-solid fa-hand-peace"></i></div></div></div>
            <div class="bg-white rounded-2xl p-5 card-hover-modern shadow-sm border border-gray-100"><div class="flex items-center justify-between"><div><p class="text-gray-500 text-sm">Overdue Follow-ups</p><p class="text-3xl font-black text-red-600 mt-1">${overdue}</p></div><div class="h-12 w-12 rounded-xl bg-red-100 text-red-500 flex items-center justify-center text-xl"><i class="fa-solid fa-bell"></i></div></div></div>
        `;
        document.getElementById('kpi-cards').innerHTML = html;
    }

    function updateStatusChartFromFiltered() {
        const regular = filteredRecords.filter(r => r.status === 'Regular').length;
        const irregular = filteredRecords.filter(r => r.status === 'Irregular').length;
        const visitors = filteredRecords.filter(r => r.status === 'Visitor' || r.status === 'First Timer').length;
        const total = filteredRecords.length;
        document.getElementById('total-center').innerText = total;
        const ctx = document.getElementById('statusChart');
        if (statusChart) statusChart.destroy();
        statusChart = new Chart(ctx, {
            type: 'doughnut',
            data: { labels: ['Regular', 'Irregular', 'Visitors'], datasets: [{ data: [regular, irregular, visitors], backgroundColor: ['#10b981', '#f59e0b', '#3b82f6'], borderWidth: 0, cutout: '70%' }] },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false }, tooltip: { callbacks: { label: (ctx) => `${ctx.label}: ${ctx.raw} members` } } } }
        });
        const legendHtml = `<div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-emerald-500"></span><span class="text-xs">Regular ${regular}</span></div>
                            <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-amber-500"></span><span class="text-xs">Irregular ${irregular}</span></div>
                            <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-blue-500"></span><span class="text-xs">Visitors ${visitors}</span></div>`;
        document.getElementById('custom-legend').innerHTML = legendHtml;
    }

    function updateTrendChartFromFiltered() {
        const dateMap = new Map();
        filteredRecords.forEach(record => {
            if (record.dateFollowedUp) {
                const day = dayjs(record.dateFollowedUp).format('YYYY-MM-DD');
                dateMap.set(day, (dateMap.get(day) || 0) + 1);
            }
        });
        const last30Days = [];
        const today = dayjs();
        for (let i = 29; i >= 0; i--) {
            last30Days.push(today.subtract(i, 'day').format('YYYY-MM-DD'));
        }
        const labels = last30Days.map(d => dayjs(d).format('MMM DD'));
        const counts = last30Days.map(d => dateMap.get(d) || 0);
        if (trendChart) trendChart.destroy();
        const ctx = document.getElementById('trendChart');
        trendChart = new Chart(ctx, {
            type: 'line',
            data: { labels: labels, datasets: [{ label: 'Follow-ups', data: counts, borderColor: '#10b981', backgroundColor: 'rgba(16,185,129,0.05)', borderWidth: 3, pointRadius: 3, pointBackgroundColor: '#059669', tension: 0.3, fill: true }] },
            options: { responsive: true, maintainAspectRatio: true, plugins: { tooltip: { mode: 'index' } }, scales: { y: { beginAtZero: true, grid: { color: '#e2e8f0' } } } }
        });
    }

    function renderTable() {
        const tbody = document.getElementById('pending-table-body');
        const start = (currentPage - 1) * rowsPerPage;
        const paginatedRows = filteredRecords.slice(start, start + rowsPerPage);
        if (paginatedRows.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" class="text-center py-12 text-gray-400"><i class="fa-regular fa-face-smile text-2xl"></i><p>No follow-up records match filters</p></td></tr>`;
            return;
        }
        tbody.innerHTML = paginatedRows.map(user => {
            const lastDate = user.dateFollowedUp ? dayjs(user.dateFollowedUp).format('MMM D, YYYY') : 'Never';
            const overdueStatus = isOverdue(user);
            const urgencyClass = overdueStatus ? 'bg-red-100 text-red-700' : 'bg-yellow-100 text-yellow-700';
            const urgencyText = overdueStatus ? 'Overdue' : 'Pending';
            const statusColor = user.status === 'Regular' ? 'bg-emerald-100 text-emerald-700' : (user.status === 'Irregular' ? 'bg-amber-100 text-amber-700' : 'bg-blue-100 text-blue-700');
            return `<tr class="hover:bg-gray-50 transition">
                <td class="px-6 py-4 font-medium">${escapeHtml(user.name || '—')}</td>
                <td class="px-6 py-4 text-gray-600">${user.phoneNumber || '—'}</td>
                <td class="px-6 py-4"><span class="px-3 py-1 text-xs rounded-full ${statusColor} font-medium">${user.status}</span></td>
                <td class="px-6 py-4 text-gray-600 text-sm">${lastDate}</td>
                <td class="px-6 py-4"><span class="px-3 py-1 text-xs rounded-full font-medium ${urgencyClass}">${urgencyText}</span></td>
                <td class="px-6 py-4 text-center"><div class="flex gap-2 justify-center">
                    <button onclick="openFollowupModal('${user._id}','${escapeHtml(user.name)}','${user.status}')" class="bg-emerald-50 hover:bg-emerald-100 text-emerald-700 px-3 py-1.5 rounded-xl text-xs font-medium transition"><i class="fa-regular fa-calendar-check"></i> Log</button>
                    <button onclick="sendSMSAction('${user.phoneNumber || ''}','${escapeHtml(user.name)}')" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1.5 rounded-xl text-xs transition"><i class="fa-solid fa-comment-sms"></i> SMS</button>
                </div></td>
            </tr>`;
        }).join('');
    }
    
    function escapeHtml(str) { return str?.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}) || ''; }

    function renderPagination() {
        const totalPages = Math.ceil(filteredRecords.length / rowsPerPage);
        const container = document.getElementById('pagination-controls');
        if (totalPages <= 1) { container.innerHTML = ''; return; }
        let btns = `<div class="flex gap-2"><button onclick="changePage(${currentPage-1})" class="px-3 py-1 rounded-lg border ${currentPage===1?'bg-gray-100 text-gray-400':'hover:bg-emerald-50'}" ${currentPage===1?'disabled':''}><i class="fa-solid fa-chevron-left"></i></button>`;
        for (let i=1; i<=totalPages; i++) {
            btns += `<button onclick="changePage(${i})" class="px-3 py-1 rounded-lg text-sm ${i===currentPage?'bg-emerald-600 text-white':'border hover:bg-gray-50'}">${i}</button>`;
        }
        btns += `<button onclick="changePage(${currentPage+1})" class="px-3 py-1 rounded-lg border ${currentPage===totalPages?'bg-gray-100 text-gray-400':'hover:bg-emerald-50'}" ${currentPage===totalPages?'disabled':''}><i class="fa-solid fa-chevron-right"></i></button></div>`;
        container.innerHTML = btns;
    }
    function changePage(page) { if (page>=1 && page <= Math.ceil(filteredRecords.length/rowsPerPage)) { currentPage=page; renderTable(); renderPagination(); } }

    function applyAllFilters() { currentPage=1; applyClientFilters(); }
    function resetAllFilters() { startDateInput.value = ''; endDateInput.value = ''; searchInput.value = ''; globalStatusSelect.value = ''; loadMasterData(); }
    function refreshDashboard(showMsg=false) { loadMasterData(); if(showMsg) showToast("Dashboard refreshed", "success"); }

    // Helper: format Ghana phone number to E.164 (+233...)
function formatPhoneForTwilio(phone) {
    if (!phone) return '';
    let cleaned = phone.replace(/\D/g, '');
    // If number starts with 0 (e.g., 055607XXXX), remove 0 and prepend 233
    if (cleaned.startsWith('0')) {
        cleaned = '233' + cleaned.substring(1);
    }
    // If number already has 233 but no leading '+', add '+'
    if (!cleaned.startsWith('+')) {
        cleaned = '+' + cleaned;
    }
    return cleaned;
}

    async function sendSMSAction(phone, name) {
    if (!phone) return showToast("No phone number available", "error");
    const formattedPhone = formatPhoneForTwilio(phone);
    console.log('Sending SMS to:', formattedPhone);
    try {
        const res = await axios.post('/send-message', { name, phone: formattedPhone });
        if(res.data.success) showToast(`SMS sent to ${name}`, 'success');
        else showToast("SMS failed", 'error');
    } catch(e) {
        console.error(e);
        showToast("SMS service error", 'error');
    }
}

    let activeUserId = null;
    function openFollowupModal(id, name, currentStatus) {
        activeUserId = id;
        document.getElementById('modalUserName').innerText = name;
        document.getElementById('modalUserId').value = id;
        document.getElementById('modalStatus').value = currentStatus;
        document.getElementById('modalFollowupDate').value = dayjs().format('YYYY-MM-DD');
        document.getElementById('followupModal').classList.remove('hidden');
        document.getElementById('followupModal').classList.add('flex');
    }
    function closeModal() { document.getElementById('followupModal').classList.add('hidden'); document.getElementById('followupModal').classList.remove('flex'); activeUserId = null; }
    
    async function submitFollowUp() {
        const userId = document.getElementById('modalUserId').value;
        const newStatus = document.getElementById('modalStatus').value;
        const newDate = document.getElementById('modalFollowupDate').value;
        if (!userId) return;

        try {
            // Fetch the existing record to get all fields
            const existingRecordRes = await axios.get(`/api/followups/${userId}`);
            const existingRecord = existingRecordRes.data;

            // Update only the fields that are changed by the modal
            const updatedPayload = { ...existingRecord, dateFollowedUp: newDate, status: newStatus };

            await axios.put(`/api/followups/${userId}`, updatedPayload);
            const record = masterRecords.find(r => r._id === userId);
            if(record) { record.dateFollowedUp = newDate; record.status = newStatus; }
            applyClientFilters();
            showToast("Follow-up recorded successfully", "success");
            closeModal();
        } catch (err) {
            const record = masterRecords.find(r => r._id === userId);
            if(record) { record.dateFollowedUp = newDate; record.status = newStatus; }
            applyClientFilters();
            showToast("Local update complete (backend sync may be needed)", "success");
            closeModal();
        }
    }

    function updateQuickRangeUI() {
        const container = document.getElementById('quick-range-buttons');
        const ranges = [
            { label: 'Today', days: 0 }, { label: 'Last 7d', days: 7 }, { label: 'Last 30d', days: 30 }, { label: 'Last 90d', days: 90 }, { label: 'All', days: null }
        ];
        container.innerHTML = ranges.map(r => `<button onclick="setQuickRange(${r.days === null ? 'null' : r.days})" class="px-4 py-2 text-sm rounded-xl bg-gray-100 hover:bg-emerald-100 transition">${r.label}</button>`).join('');
    }
    window.setQuickRange = (days) => {
        if (days === null) { startDateInput.value = ''; endDateInput.value = ''; }
        else {
            const end = new Date();
            const start = new Date();
            start.setDate(end.getDate() - days);
            startDateInput.value = start.toISOString().split('T')[0];
            endDateInput.value = end.toISOString().split('T')[0];
        }
        applyClientFilters();
    };
    
    window.exportToCSV = () => {
        if(filteredRecords.length === 0) return showToast("No data to export", "error");
        const headers = ["Name", "Phone", "Status", "Last Follow-up", "Overdue Status"];
        const rows = filteredRecords.map(r => [r.name || '', r.phoneNumber || '', r.status || '', r.dateFollowedUp || 'Never', isOverdue(r) ? 'Overdue' : 'Pending']);
        const csv = [headers, ...rows].map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(",")).join("\n");
        const blob = new Blob([csv], {type: "text/csv"}); const a = document.createElement('a'); const url = URL.createObjectURL(blob); a.href = url; a.download = `rccg_followup_${dayjs().format('YYYY-MM-DD')}.csv`; a.click(); URL.revokeObjectURL(url); showToast("CSV exported", "success");
    };
    
    // ========== INITIALIZE ON PAGE LOAD ==========
   document.addEventListener('DOMContentLoaded', () => {
    // Load data immediately
    loadMasterData();
    // Then refresh every 2 minutes
    setInterval(() => { loadMasterData(); }, 120000);
});
</script>
